name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING_KEY: ${{ secrets.SIGNING_KEY_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Sign APK
        id: sign
        if: env.HAS_SIGNING_KEY == 'true'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Prepare APK
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          if [ -n "${{ steps.sign.outputs.signedReleaseFile }}" ]; then
            cp ${{ steps.sign.outputs.signedReleaseFile }} app/build/outputs/apk/release/roadmemo-${TAG_NAME}.apk
          else
            cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/roadmemo-${TAG_NAME}.apk
          fi

      - name: Generate Changelog
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "$TAG_NAME" | tail -1)
          if [ -z "$PREV_TAG" ]; then
            echo "## $TAG_NAME" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --oneline --no-decorate >> CHANGELOG.md
          else
            echo "## $TAG_NAME" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --oneline --no-decorate ${PREV_TAG}..HEAD >> CHANGELOG.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: app/build/outputs/apk/release/roadmemo-${{ github.ref_name }}.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}